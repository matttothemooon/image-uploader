<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Uploader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #c8ff00;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
      font-size: 0.9rem;
    }

    #drop-zone.drag-over {
      border-color: #c8ff00;
      background: rgba(200, 255, 0, 0.04);
      color: #c8ff00;
    }

    #drop-zone span {
      display: block;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    #file-input { display: none; }

    #preview {
      margin-top: 1rem;
      display: none;
    }

    #preview img {
      width: 100%;
      border-radius: 6px;
      max-height: 220px;
      object-fit: cover;
    }

    #upload-btn {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #c8ff00;
      color: #0d0d0d;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s;
    }

    #upload-btn:hover { opacity: 0.85; }
    #upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #result {
      margin-top: 1rem;
      display: none;
    }

    #result label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 0.3rem;
    }

    .result-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .result-row input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #f0f0f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      outline: none;
    }

    .copy-btn {
      background: #222;
      border: 1px solid #333;
      color: #c8ff00;
      border-radius: 6px;
      padding: 0 0.75rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }

    .copy-btn:hover { background: #2a2a2a; }

    #status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
    }

    #status.error { color: #ff5555; }
    #status.success { color: #c8ff00; }
  </style>
</head>
<body>

<div class="card">
  <h1>📤 Image Uploader</h1>

  <div id="drop-zone">
    <span>🖼️</span>
    Click or drag an image here
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div id="preview">
    <img id="preview-img" src="" alt="Preview">
  </div>

  <button id="upload-btn">Upload to Catbox</button>

  <div id="result">
    <label>Direct URL</label>
    <div class="result-row">
      <input type="text" id="direct-url" readonly>
      <button class="copy-btn" onclick="copyField('direct-url')">Copy</button>
    </div>

    <label>Markdown</label>
    <div class="result-row">
      <input type="text" id="markdown-url" readonly>
      <button class="copy-btn" onclick="copyField('markdown-url')">Copy</button>
    </div>

    <label>BBCode</label>
    <div class="result-row">
      <input type="text" id="bbcode-url" readonly>
      <button class="copy-btn" onclick="copyField('bbcode-url')">Copy</button>
    </div>
  </div>

  <div id="status"></div>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const previewDiv = document.getElementById('preview');
  const previewImg = document.getElementById('preview-img');
  const uploadBtn = document.getElementById('upload-btn');
  const resultDiv = document.getElementById('result');
  const status = document.getElementById('status');

  let selectedFile = null;

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      previewImg.src = e.target.result;
      previewDiv.style.display = 'block';
      uploadBtn.style.display = 'block';
      resultDiv.style.display = 'none';
      setStatus('');
    };
    reader.readAsDataURL(file);
  }

  const IMGBB_KEY = 'cf2d8be70127dbd60bf6635970e4a0ed'; // 👈 paste your ImgBB API key

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    setStatus('Uploading...');

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
        method: 'POST',
        body: formData
      });

      const data = await res.json();
      if (!data.success) throw new Error(data.error?.message || 'Upload failed');

      const url = data.data.url;
      document.getElementById('direct-url').value = url;
      document.getElementById('markdown-url').value = `![image](${url})`;
      document.getElementById('bbcode-url').value = `[img]${url}[/img]`;
      resultDiv.style.display = 'block';
      setStatus('✅ Uploaded!', 'success');
    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  });

  function setStatus(msg, type = '') {
    status.textContent = msg;
    status.className = type;
  }

  function copyField(id) {
    const input = document.getElementById(id);
    navigator.clipboard.writeText(input.value);
  }
</script>

</body>
</html>
